# TeamBrain — automated versioning + npm publish (Changesets)
#
# Replaces the old continuous publish.yml. The flow:
#   1. Every change PR includes a changeset (`pnpm changeset`) describing the
#      bump. All @teambrain/* packages are `fixed` (lockstep), so one changeset
#      bumps them together.
#   2. On push to main, changesets/action either:
#      - opens/updates a "Version Packages" PR that consumes the pending
#        changesets, bumps versions, and writes CHANGELOGs; or
#      - if no changesets remain (that PR was just merged), runs `release` →
#        `pnpm -r publish`, pushing the new versions to npm.
#
# pnpm (not `changeset publish`) does the publishing so `workspace:*` deps are
# rewritten to real versions and already-published versions are skipped.
# Requires the NPM_TOKEN repository secret; provenance via GitHub OIDC.
name: changesets

on:
  push:
    branches: [main]

concurrency:
  group: changesets
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # push the Version Packages PR + tags
      pull-requests: write # open the Version Packages PR
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Create Version PR or publish to npm
        uses: changesets/action@v1
        with:
          version: pnpm run version-packages
          publish: pnpm run release
          commit: 'chore(release): version packages'
          title: 'chore(release): version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
