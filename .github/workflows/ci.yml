name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  actionlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # M7 accept gate (AUDIT.md F6), pinned to the version verified in the
      # I0 audit. shellcheck/pyflakes are explicitly disabled so CI enforces
      # exactly the rule set that verification covered; turning them on is
      # I3/I4 hardening once their findings are triaged.
      - name: actionlint over workflows and ci-templates
        uses: docker://rhysd/actionlint:1.7.1
        with:
          args: >-
            -shellcheck= -pyflakes=
            .github/workflows/ci.yml
            .github/workflows/nightly.yml
            .github/workflows/changesets.yml
            .github/workflows/release.yml
            .github/workflows/smoke.yml
            ci-templates/codemap.yml
            ci-templates/digest.yml
            ci-templates/flightdeck.yml
            ci-templates/distill.yml
            ci-templates/lint.yml
            ci-templates/sessions-rotation.yml

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      - run: pnpm lint

      - run: pnpm bench
