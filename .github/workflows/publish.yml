# TeamBrain — continuous npm publish
#
# On every push to main that touches packages/, publish any package whose
# version is not yet on the registry. `pnpm -r publish` compares each
# package's version against npmjs.org and skips already-published ones, so
# this is a no-op until a version is bumped — bump, merge, published.
#
# Complements release.yml (tag-triggered: publish + standalone binaries).
# Both use `pnpm -r publish`, so overlap is harmless: existing versions are
# skipped. Requires the NPM_TOKEN repository secret (an npm automation /
# granular token with publish rights for @teambrain). Provenance comes from
# GitHub's OIDC (id-token: write) per each package's publishConfig.
name: publish

on:
  push:
    branches: [main]
    paths:
      - 'packages/**'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # npm provenance
    steps:
      - uses: actions/checkout@v4

      - run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      - run: pnpm test

      # Skips every package whose current version already exists on the
      # registry; publishes the rest in dependency order.
      - name: Publish updated packages
        run: pnpm -r publish --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
