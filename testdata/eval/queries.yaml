# R10 retrieval-eval query set over testdata/eval/corpus/ (a real brain:
# the dogfood .teambrain/ plus the repo's hand-written fixture memories).
#
# Authoring rules (Tech Brief §3.2): queries are phrased from the agent's /
# developer's perspective and deliberately paraphrased AWAY from the target
# memory's vocabulary. `relevant` lists every memory id that should surface;
# an empty list marks a negative — the correct answer is "nothing relevant".
#
# Provenance (honest): written_by is `assistant` — these were authored by an
# AI assistant that had read the corpus, then paraphrased. That is weaker
# than the brief's human-blind standard; treat absolute numbers as
# directional and replace/extend with human-written queries from real
# sessions as they accumulate (tracked in docs/RETRIEVAL.md).
#
# kind: structural | decision | convention | gotcha | negative

